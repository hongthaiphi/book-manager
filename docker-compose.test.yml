services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book_manager_test
    tmpfs:
      - /var/lib/postgresql/data   # in-memory, wiped after run
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

  test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    volumes:
      - ./backend:/app
    environment:
      - TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@test-db:5432/book_manager_test
      # Dummy values so Settings() doesn't raise on startup
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@test-db:5432/book_manager_test
      - SECRET_KEY=test-secret-key-not-for-production
      - REFRESH_SECRET_KEY=test-refresh-secret
      - GOOGLE_CLIENT_ID=fake-client-id
      - GOOGLE_CLIENT_SECRET=fake-client-secret
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/auth/google/callback
      - CLOUDINARY_CLOUD_NAME=fake
      - CLOUDINARY_API_KEY=fake
      - CLOUDINARY_API_SECRET=fake
    depends_on:
      test-db:
        condition: service_healthy
    command: pytest tests/ -v --tb=short
